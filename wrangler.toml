name = "insave"
main = "worker/index.ts"
compatibility_date = "2024-09-23"

# Single Worker serves the static PWA (Vite build output) AND the /api/* endpoints.
# A request that matches a built asset is served directly; anything else (e.g. /api/sync)
# falls through to the Worker's fetch handler.
[assets]
directory = "./dist"

[[d1_databases]]
binding = "DB"
database_name = "insave"
database_id = "269f5f49-32af-44cd-9143-9640a4f83648"

[triggers]
crons = ["0 * * * *"]

